name: Daily Dependency Update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-deps:
    uses: shaftoe/update-bun-dependencies-action/.github/workflows/update-bun-dependencies.yml@v1
    with:
      post-update-run: "bun run check && bun run test && bun run build"
